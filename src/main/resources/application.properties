# Connection to PostgreSQL database (Docker container)
spring.datasource.url=jdbc:postgresql://localhost:5432/inventory
spring.datasource.username=admin
spring.datasource.password=secret

# Driver and dialect for PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate: automatically create/update the database schema based on the entities
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements in the console for debugging purposes
spring.jpa.show-sql=true
